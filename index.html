<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kira Sözleşmesi Oluşturucu</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 30px 16px 60px;
        }
        .header { text-align: center; margin-bottom: 22px; }
        .header h1 { font-size: 30px; color: #fff; font-weight: 700; }
        .header h1 span { color: #c9a84c; }
        .header p { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 6px; }
        .tab-bar { max-width: 720px; margin: 0 auto 16px; display: flex; gap: 8px; }
        .tab-btn {
            flex: 1; padding: 11px 10px; border: none; border-radius: 9px 9px 0 0;
            font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55);
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active { background: #faf8f3; color: #1a1a2e; border-bottom: 3px solid #c9a84c; }
        .tab-btn .badge {
            background: #c9a84c; color: #1a1a2e; font-size: 10px; font-weight: 800;
            padding: 1px 6px; border-radius: 10px; min-width: 20px; text-align: center;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .card {
            max-width: 720px; margin: 0 auto; background: #faf8f3;
            border-radius: 0 0 14px 14px; overflow: hidden; box-shadow: 0 24px 70px rgba(0,0,0,0.5);
        }
        .card-top {
            background: #1a1a2e; padding: 18px 28px; border-bottom: 2px solid #c9a84c;
            display: flex; align-items: center; gap: 12px;
        }
        .card-top .icon {
            width: 38px; height: 38px; background: linear-gradient(135deg,#c9a84c,#e8c96a);
            border-radius: 9px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .card-top h2 { color: #fff; font-size: 17px; }
        .card-top p { color: rgba(255,255,255,0.45); font-size: 12px; margin-top: 2px; }
        .form-body { padding: 28px; }
        .autosave-bar {
            background: #f0f7f0; border: 1px solid #b8dab8; border-radius: 7px;
            padding: 9px 14px; font-size: 11.5px; color: #2d6a4f; margin-bottom: 16px;
            display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
        }
        .mulk-tipi-bar {
            display: flex; align-items: center; gap: 8px;
            background: #e8f4fd; border: 1px solid #90caf9; border-radius: 7px;
            padding: 8px 14px; font-size: 12px; color: #1a4a6e; margin-bottom: 14px;
        }
        .mulk-tipi-bar.isyeri { background: #fff3e0; border-color: #ffb74d; color: #7a4a00; }
        .tipi-badge { font-weight: 800; padding: 2px 10px; border-radius: 12px; background: #1a1a2e; color: #c9a84c; }
        .isyeri .tipi-badge { background: #e65100; color: #fff; }
        .note { background: #fef9ea; border: 1px solid #e8d5a3; border-radius: 7px; padding: 11px 15px; font-size: 12px; color: #6b6456; margin-bottom: 22px; }
        .sec-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #c9a84c; margin-bottom: 14px; padding-bottom: 7px; border-bottom: 1px solid #d4c9b0; display: flex; align-items: center; gap: 7px; }
        .grid { display: grid; gap: 12px; }
        .g2 { grid-template-columns: 1fr 1fr; }
        .g3 { grid-template-columns: 1fr 1fr 1fr; }
        .span2 { grid-column: span 2; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 10.5px; font-weight: 600; color: #6b6456; text-transform: uppercase; }
        input, textarea, select { padding: 9px 12px; border: 1.5px solid #d4c9b0; border-radius: 7px; font-size: 14px; }
        input:focus { border-color: #c9a84c; outline: none; }
        .divider { height: 1px; background: #d4c9b0; margin: 22px 0; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 14px; border: none; border-radius: 9px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gold { background: linear-gradient(135deg,#c9a84c,#e8c96a); color: #1a1a2e; }
        .btn-dark { background: #1a1a2e; color: #fff; }
        .btn-full { grid-column: span 2; margin-top: 10px; }
        .spinner { display: none; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; color: #fff; z-index: 9999; font-weight: 600; }
        .toast.ok { background: #2d6a4f; }
        .toast.err { background: #8b3a2a; }
        .archive-list { padding: 20px; }
        .arc-item { background: #fff; border: 1px solid #d4c9b0; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .kosul-item { display: flex; gap: 10px; background: #fff; padding: 10px; border: 1px solid #d4c9b0; border-radius: 8px; margin-bottom: 8px; }
        .kosul-text { flex: 1; border: none; resize: none; font-size: 13px; }
        @media(max-width:600px){ .g2, .g3 { grid-template-columns: 1fr; } .span2 { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>Kira <span>Sözleşmesi</span></h1>
    <p>Profesyonel Sözleşme Oluşturucu</p>
</div>

<div class="tab-bar">
    <button class="tab-btn active" id="tab-form" onclick="switchTab('form')">📝 Form</button>
    <button class="tab-btn" id="tab-archive" onclick="switchTab('archive')">🗂️ Arşiv <span class="badge" id="archiveBadge">0</span></button>
    <button class="tab-btn" id="tab-kosullar" onclick="switchTab('kosullar')">⚙️ Koşullar <span class="badge" id="kosullarBadge">17</span></button>
</div>

<div class="panel active" id="panel-form">
    <div class="card">
        <div class="card-top">
            <div class="icon">🏠</div>
            <div><h2>Sözleşme Bilgileri</h2><p>Lütfen yıldızlı alanları doldurun</p></div>
        </div>
        <div class="form-body">
            <div class="autosave-bar">
                <span>💾 <span id="autosaveInfo">Taslak otomatik kaydedilir</span></span>
                <button style="padding:5px 10px; border-radius:5px; border:none; cursor:pointer;" onclick="clearForm()">🗑️ Temizle</button>
            </div>

            <div class="mulk-tipi-bar" id="mulkTipiBar">
                <span class="tipi-badge" id="mulkTipiBadge">EV</span>
                <span id="mulkTipiAciklama">Kullanım amacına göre otomatik belirlenir.</span>
            </div>

            <div class="sec-group">
                <div class="sec-title">Mülk Bilgileri</div>
                <div class="grid g2">
                    <div class="field"><label>Kiralananın Cinsi *</label><input id="cins" placeholder="ör. Daire, Dükkan"></div>
                    <div class="field"><label>Kullanım Amacı</label><input id="kullanim" placeholder="ör. Mesken, İşyeri" oninput="updateMulkTipiBar()"></div>
                    <div class="field"><label>Mahalle</label><input id="mahallesi" placeholder="Mahalle"></div>
                    <div class="field"><label>İlçe / İl</label><input id="dairesi" placeholder="Çerkezköy / Tekirdağ"></div>
                    <div class="field span2"><label>Adres Detay</label><input id="sokak" placeholder="Sokak, No, Daire"></div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="sec-group">
                <div class="sec-title">Taraflar</div>
                <div class="grid g2">
                    <div class="field"><label>Kiraya Veren *</label><input id="veren_ad" placeholder="Ad Soyad"></div>
                    <div class="field"><label>Kiracı *</label><input id="kiraci_ad" placeholder="Ad Soyad"></div>
                    <div class="field"><label>Veren TC</label><input id="veren_tc" maxlength="11"></div>
                    <div class="field"><label>Kiracı TC</label><input id="kiraci_tc" maxlength="11"></div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="sec-group">
                <div class="sec-title">Ödeme ve Süre</div>
                <div class="grid g3">
                    <div class="field"><label>Aylık Kira *</label><input type="number" id="aylik_kira"></div>
                    <div class="field"><label>Depozito</label><input type="number" id="depozito"></div>
                    <div class="field"><label>Başlangıç *</label><input type="date" id="baslangic"></div>
                    <div class="field"><label>Müddet</label><input id="muddet" placeholder="1 Yıl"></div>
                    <div class="field span2"><label>IBAN</label><input id="banka" placeholder="TR..."></div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="btn-row">
                <button class="btn btn-dark" onclick="saveToArchive()">🗂️ Arşive Kaydet</button>
                <button class="btn btn-gold" id="genBtn" onclick="generate()">
                    <span id="btnIcon">⬇</span> <span id="btnText">PDF Oluştur</span>
                    <div class="spinner" id="spinner"></div>
                </button>
                <button class="btn btn-gold btn-full" onclick="generateAndSave()">📥 PDF Oluştur ve Arşive Kaydet</button>
            </div>
        </div>
    </div>
</div>

<div class="panel" id="panel-archive">
    <div class="card">
        <div class="archive-list" id="archiveList"></div>
    </div>
</div>

<div class="panel" id="panel-kosullar">
    <div class="card">
        <div style="padding:20px;" id="kosulList"></div>
        <div style="padding:20px; text-align:center;">
            <button class="btn btn-dark" onclick="resetKosullar()">Varsayılana Sıfırla</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DRAFT_KEY = 'kiraSozDraft';
const ARCHIVE_KEY = 'kiraSozArchive';
const KOSULLAR_KEY = 'kiraSozKosullar';

const FIELD_IDS = [
    'cins','kullanim','mahallesi','dairesi','sokak',
    'veren_ad','veren_tc','banka',
    'kiraci_ad','kiraci_tc',
    'aylik_kira','depozito','baslangic','muddet'
];

const KOSULLAR_DEFAULT = [
    "Kiracı, kat mülkiyeti kanununa uymayı aynen kabul ve taahhüt eder.",
    "Kiracı, {MEKAN}in çevresinde oturanlara iyi niyet kuralları içinde davranacaktır.",
    "Kiracı, {MEKAN}i kısmen veya tamamen bir başkasına kiraya veremez, devir edemez.",
    "Elektrik, su, doğalgaz, apartman veya siteye ait tüm aidatlar kiracıya aittir.",
    "Kiracı apartman veya site yönetiminin alacağı kararlara aynen uymak zorundadır.",
    "Kiracı, {MEKAN}de yapılması gereken tadilatları mal sahibine bildirmek zorundadır.",
    "Kiracı mal sahibine vermiş olduğu depozitoyu yapacağı tamirata mahsup edemez.",
    "Kiralanan {MEKAN}in mülkiyet hakkından doğan vergiler ev sahibine aittir.",
    "Kiracı, kira sözleşmesinin sonunda {MEKAN}i teslim aldığı şekilde teslim etmek zorundadır.",
    "Kiracı, satılığa sunulması halinde {MEKAN}in gezilmesine izin vermek zorundadır.",
    "Kiracı, yaptığı kalıcı ilavelerin bedelini mülk sahibinden isteyemez.",
    "Kiralanan {MEKAN}in boşaltılması gerektiği hallerde kiracı sorumludur.",
    "Kiracı, mülk sahibinin yazılı olurunu almak şartıyla donanım ekleyebilir.",
    "Kiracı {MEKAN}i boşaltmak istediği takdirde en az 15 gün önceden bildirmelidir.",
    "İş bu kontrat 1 yıllıktır. İhtar yapılmadığı sürece yenilenmiş kabul edilir.",
    "Sözleşmede yazılı adresler kanuni ikametgâh adresi olarak kabul edilir.",
    "Yıllık zam oranı TÜFE/ÜFE oranında artırılacaktır."
];

// MÜLK TİPİ
function getMulkTipi() {
    const val = (document.getElementById('kullanim').value || '').toLowerCase();
    const isyeriKelimeler = ['ticari','işyeri','isyeri','dükkan','dukkan','ofis','depo','buro','büro'];
    for(let k of isyeriKelimeler) { if(val.includes(k)) return 'işyeri'; }
    return 'ev';
}

function updateMulkTipiBar() {
    const tip = getMulkTipi();
    const badge = document.getElementById('mulkTipiBadge');
    const bar = document.getElementById('mulkTipiBar');
    if(tip === 'işyeri') {
        badge.textContent = '🏢 İŞYERİ';
        bar.classList.add('isyeri');
    } else {
        badge.textContent = '🏠 EV';
        bar.classList.remove('isyeri');
    }
}

// YARDIMCI FONKSİYONLAR
function toast(msg, type='ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if(tab === 'archive') renderArchive();
    if(tab === 'kosullar') renderKosullar();
}

function clearForm() {
    FIELD_IDS.forEach(id => document.getElementById(id).value = '');
    localStorage.removeItem(DRAFT_KEY);
    toast('Form temizlendi', 'err');
}

// VERİ İŞLEMLERİ
function readForm() {
    let data = {};
    FIELD_IDS.forEach(id => data[id] = document.getElementById(id).value);
    return data;
}

function saveToArchive(silent = false) {
    const data = readForm();
    if(!data.kiraci_ad) { toast('Lütfen en azından kiracı adını girin', 'err'); return; }
    let archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
    archive.unshift({ id: Date.now(), date: new Date().toLocaleString(), fields: data });
    localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));
    updateBadge();
    if(!silent) toast('Arşive kaydedildi');
}

function updateBadge() {
    const arc = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
    document.getElementById('archiveBadge').textContent = arc.length;
}

function renderArchive() {
    const list = document.getElementById('archiveList');
    const arc = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
    if(arc.length === 0) { list.innerHTML = '<p style="text-align:center; padding:20px;">Arşiv boş.</p>'; return; }
    list.innerHTML = arc.map(item => `
        <div class="arc-item">
            <strong>${item.fields.kiraci_ad || 'İsimsiz'}</strong> - ${item.fields.aylik_kira || 0} TL
            <br><small>${item.date}</small>
            <div style="margin-top:10px;">
                <button onclick="loadArchive(${item.id})" style="padding:4px 8px; cursor:pointer;">📂 Yükle</button>
                <button onclick="deleteArchive(${item.id})" style="padding:4px 8px; cursor:pointer; color:red;">🗑️ Sil</button>
            </div>
        </div>
    `).join('');
}

function loadArchive(id) {
    const arc = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
    const item = arc.find(x => x.id === id);
    if(item) {
        FIELD_IDS.forEach(f => document.getElementById(f).value = item.fields[f] || '');
        switchTab('form');
        toast('Veriler yüklendi');
    }
}

function deleteArchive(id) {
    let arc = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
    arc = arc.filter(x => x.id !== id);
    localStorage.setItem(ARCHIVE_KEY, JSON.stringify(arc));
    renderArchive();
    updateBadge();
}

// KOŞULLAR
function getKosullar() {
    return JSON.parse(localStorage.getItem(KOSULLAR_KEY) || JSON.stringify(KOSULLAR_DEFAULT));
}

function renderKosullar() {
    const list = document.getElementById('kosulList');
    const kosullar = getKosullar();
    list.innerHTML = kosullar.map((k, i) => `
        <div class="kosul-item">
            <span>${i+1}</span>
            <textarea class="kosul-text" onchange="updateKosul(${i}, this.value)">${k}</textarea>
        </div>
    `).join('');
}

function updateKosul(index, val) {
    let kosullar = getKosullar();
    kosullar[index] = val;
    localStorage.setItem(KOSULLAR_KEY, JSON.stringify(kosullar));
}

function resetKosullar() {
    localStorage.removeItem(KOSULLAR_KEY);
    renderKosullar();
    toast('Koşullar sıfırlandı');
}

// PDF OLUŞTURMA
function generate() {
    const d = readForm();
    if(!d.veren_ad || !d.kiraci_ad || !d.aylik_kira) {
        toast('Lütfen zorunlu alanları doldurun!', 'err');
        return;
    }

    const tip = getMulkTipi();
    const kosullar = getKosullar().map((k, i) => {
        let text = k.replace(/{MEKAN}/g, tip === 'işyeri' ? 'işyeri' : 'ev');
        return `<p style="font-size:10pt; margin-bottom:5px;">${i+1}. ${text}</p>`;
    }).join('');

    const html = `
        <html><head><title>Kira Sözleşmesi</title>
        <style>
            body { font-family: sans-serif; padding: 20px; color: #111; }
            h1 { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            td { padding: 8px; border: 1px solid #ccc; }
            .label { font-weight: bold; width: 30%; background: #f9f9f9; }
            .sig-area { display: flex; justify-content: space-around; margin-top: 50px; text-align: center; }
            .sig-box { border-top: 1px solid #000; width: 200px; padding-top: 10px; }
        </style>
        </head><body>
            <h1>KİRA SÖZLEŞMESİ (${tip.toUpperCase()})</h1>
            <table>
                <tr><td class="label">Kiraya Veren</td><td>${d.veren_ad}</td></tr>
                <tr><td class="label">Kiracı</td><td>${d.kiraci_ad}</td></tr>
                <tr><td class="label">Cins / Adres</td><td>${d.cins} - ${d.mahallesi} ${d.sokak} ${d.dairesi}</td></tr>
                <tr><td class="label">Başlangıç / Süre</td><td>${d.baslangic} / ${d.muddet}</td></tr>
                <tr><td class="label">Aylık Kira</td><td>${d.aylik_kira} TL</td></tr>
                <tr><td class="label">IBAN</td><td>${d.banka}</td></tr>
            </table>
            <h3 style="margin-top:30px;">GENEL KOŞULLAR</h3>
            ${kosullar}
            <div class="sig-area">
                <div class="sig-box">KİRAYA VEREN<br><br>${d.veren_ad}</div>
                <div class="sig-box">KİRACI<br><br>${d.kiraci_ad}</div>
            </div>
        </body></html>
    `;

    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    setTimeout(() => { win.print(); }, 500);
}

function generateAndSave() {
    saveToArchive(true);
    generate();
}

// Olay Dinleyicileri
document.addEventListener('DOMContentLoaded', () => {
    updateBadge();
    const draft = localStorage.getItem(DRAFT_KEY);
    if(draft) {
        const data = JSON.parse(draft);
        FIELD_IDS.forEach(id => { if(data[id]) document.getElementById(id).value = data[id]; });
    }

    FIELD_IDS.forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            localStorage.setItem(DRAFT_KEY, JSON.stringify(readForm()));
        });
    });
});
</script>

</body>
</html>
